name: CI

on:
  pull_request:
  push:
    # main push is handled by the release workflow — no duplicate CI run here
    branches-ignore: [main]
  schedule:
    # Monthly re-run (1st of each month, 06:00 UTC) so a new CPython point
    # release catches regressions early. Python minor releases ship yearly
    # and patch releases every ~2 months, so monthly is plenty.
    - cron: "0 6 1 * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    name: "py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # Allow pre-release/RC channels when GA isn't on the runner yet
          # (e.g. 3.14 around its release window).
          allow-prereleases: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install system deps (protoc for gcld3)
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Install project
        run: uv sync --extra dev --extra cld3

      - name: Ruff lint
        run: uv run ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ scripts/

      - name: Mypy
        run: uv run mypy src/robust_lid

      - name: Pytest (fast suite)
        run: uv run pytest -m "not slow and not network"
